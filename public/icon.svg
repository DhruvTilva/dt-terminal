<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0B1220"/>

  <!-- Bar chart — 4 bars in green -->
  <rect x="3"  y="18" width="5" height="11" rx="1.5" fill="#22C55E"/>
  <rect x="10" y="14" width="5" height="15" rx="1.5" fill="#22C55E"/>
  <rect x="17" y="20" width="5" height="9"  rx="1.5" fill="#22C55E" opacity="0.6"/>
  <rect x="24" y="12" width="5" height="17" rx="1.5" fill="#22C55E"/>

  <!-- Trend line going up with arrow -->
  <polyline
    points="5,22 12,16 19,21 28,9"
    stroke="#3B82F6"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Arrow tip -->
  <polyline
    points="24,8 28,9 27,13"
    stroke="#3B82F6"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
