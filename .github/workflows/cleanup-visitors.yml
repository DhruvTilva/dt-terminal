name: Cleanup Old Visitor Logs

# Manual trigger only — run whenever you want from GitHub Actions tab
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete visitor_logs older than 30 days
        run: |
          response=$(curl -s -o /tmp/cleanup_response.json -w "%{http_code}" \
            -X DELETE "${{ secrets.SITE_URL }}/api/admin/cleanup-visitors" \
            -H "x-cleanup-secret: ${{ secrets.CLEANUP_SECRET }}")

          cat /tmp/cleanup_response.json
          echo ""
          echo "HTTP Status: $response"

          if [ "$response" != "200" ]; then
            echo "Cleanup failed with status $response"
            exit 1
          fi
